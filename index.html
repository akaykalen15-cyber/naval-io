<!DOCTYPE html>
<html>
<head>
    <title>Naval.io - Sea Warfare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen {
            background: #111827;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        #joinScreen h1 {
            color: #00bcd4;
            margin-bottom: 20px;
            font-size: 42px;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 18px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
        }
        #joinScreen select {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
        }
        #joinBtn {
            background: #00bcd4;
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        #joinBtn:hover {
            background: #0097a7;
        }
        .errorMsg { color: #ef4444; margin-top: 10px; font-size: 14px; }
        .level-info {
            background: #1f2937;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            color: #fbbf24;
            font-size: 14px;
        }
        #gameScreen {
            background: #111827;
            padding: 0;
            border-radius: 16px;
        }
        #gameContainer { position: relative; }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
        }
        .stats {
            pointer-events: auto;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            border: 1px solid #374151;
        }
        .health-bar {
            width: 100px;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            margin-left: 8px;
        }
        .health-fill {
            height: 100%;
            width: 100%;
            background: #22c55e;
            border-radius: 4px;
            transition: width 0.2s;
        }
        #chatOverlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 280px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            border: 1px solid #374151;
            z-index: 10;
        }
        #chatMessages {
            height: 100px;
            overflow-y: auto;
            padding: 6px;
            font-size: 11px;
            color: #ccc;
        }
        #chatInputArea {
            display: flex;
            padding: 5px;
            gap: 5px;
            border-top: 1px solid #374151;
        }
        #chatInput {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 5px 8px;
            border-radius: 6px;
            outline: none;
            font-size: 11px;
        }
        #chatSend {
            background: #00bcd4;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .chat-system { color: #ef4444; font-style: italic; }
        .hidden { display: none; }
        .controls-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            color: #888;
            pointer-events: none;
        }
        #shipSelectPanel {
            position: absolute;
            bottom: 100px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #00bcd4;
            z-index: 20;
            min-width: 180px;
        }
        #shipSelectPanel h4 {
            color: #00bcd4;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .ship-option {
            background: #1f2937;
            padding: 6px 10px;
            margin: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .ship-option:hover {
            background: #374151;
            transform: scale(1.02);
        }
        .ship-option.selected {
            border: 1px solid #00bcd4;
            background: #00bcd4;
            color: #1f2937;
        }
        .ship-option.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>⚓ NAVAL.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter captain name">
    <select id="shipSelect">
        <option value="rowboat">🛶 Rowboat (Level 0)</option>
    </select>
    <button id="joinBtn">Set Sail ⚓</button>
    <div class="level-info">⚡ Level up by earning points! New ships unlock every level.</div>
    <div id="errorMsg" class="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1400" height="900"></canvas>
        
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">⚓ Level: <span id="levelValue">0</span></div>
            <div class="stats">❤️ <span id="healthValue">100</span><div class="health-bar"><div id="healthFill" class="health-fill"></div></div></div>
            <div class="stats">⚔️ Kills: <span id="killsValue">0</span></div>
        </div>
        
        <div id="shipSelectPanel">
            <h4>🚢 SELECT SHIP</h4>
            <div id="shipList"></div>
        </div>
        
        <div id="chatOverlay">
            <div id="chatMessages"></div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="100">
                <button id="chatSend">Send</button>
            </div>
        </div>
        <div class="controls-hint">WASD/Arrows | 🖱️ Aim | Click Shoot | ⛽ Stand in green circles for points</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let enemies = [];
    let crates = [];
    let petrolStations = [];
    let myId = null;
    let myPlayer = null;
    let currentScore = 0;
    let currentHealth = 100;
    let currentLevel = 0;
    let currentKills = 0;
    let bullets = [];
    let availableShips = [];
    let selectedShipId = 'rowboat';
    
    let cameraX = 0, cameraY = 0;
    let mouseX = 0, mouseY = 0;
    let isShooting = false;
    let lastShotTime = 0;
    let fireRate = 700;
    let shipDamage = 8;
    let shipSpeed = 5;
    let shipSize = 14;
    
    const MAP_WIDTH = 6000;
    const MAP_HEIGHT = 6000;
    
    const keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    
    // DOM elements
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const shipSelect = document.getElementById('shipSelect');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const levelElement = document.getElementById('levelValue');
    const healthValue = document.getElementById('healthValue');
    const healthFill = document.getElementById('healthFill');
    const killsElement = document.getElementById('killsValue');
    const shipList = document.getElementById('shipList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    
    function formatNumber(n) {
        if (n >= 10000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }
    
    function addChatMessage(sender, message, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) chatMessages.removeChild(chatMessages.firstChild);
    }
    
    function sendChat() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendChat;
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });
    
    function updateShipList() {
        if (!shipList) return;
        shipList.innerHTML = '';
        for (const ship of availableShips) {
            const div = document.createElement('div');
            div.className = `ship-option ${selectedShipId === ship.id ? 'selected' : ''}`;
            div.innerHTML = `${ship.name} (Lvl ${ship.level})`;
            div.onclick = () => {
                if (ship.level <= currentLevel) {
                    selectedShipId = ship.id;
                    updateShipList();
                    if (myPlayer) {
                        socket.emit('changeShip', { shipId: selectedShipId });
                    }
                }
            };
            shipList.appendChild(div);
        }
    }
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        socket.emit('joinGame', { username: username, shipId: selectedShipId });
        
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                updateShooting();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        
        setInterval(() => {
            if (myPlayer) {
                socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
            }
        }, 50);
    };
    
    socket.on('connect', () => console.log('Connected'));
    
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                currentScore = myPlayer.score || 0;
                currentHealth = myPlayer.health || 100;
                currentLevel = myPlayer.level || 0;
                currentKills = myPlayer.kills || 0;
                scoreElement.innerText = formatNumber(currentScore);
                levelElement.innerText = currentLevel;
                healthValue.innerText = currentHealth;
                healthFill.style.width = `${(currentHealth / (myPlayer.maxHealth || 100)) * 100}%`;
                killsElement.innerText = currentKills;
                fireRate = myPlayer.fireRate || 700;
                shipDamage = myPlayer.damage || 8;
                shipSpeed = myPlayer.speed || 5;
                shipSize = myPlayer.size || 14;
            }
        }
    });
    
    socket.on('availableShips', (ships) => {
        availableShips = ships;
        updateShipList();
    });
    
    socket.on('currentEnemies', (serverEnemies) => { enemies = serverEnemies; });
    socket.on('enemiesUpdate', (serverEnemies) => { enemies = serverEnemies; });
    socket.on('currentCrates', (serverCrates) => { crates = serverCrates; });
    socket.on('cratesUpdate', (serverCrates) => { crates = serverCrates; });
    socket.on('stationsUpdate', (stations) => { petrolStations = stations; });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        addChatMessage('System', `${playerData.username} joined!`, true);
    });
    
    socket.on('playerMoved', (data) => {
        if (players[data.id]) {
            players[data.id].x = data.x;
            players[data.id].y = data.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, true);
            delete players[playerId];
        }
    });
    
    socket.on('scoreUpdate', (data) => {
        if (data.id === myId) {
            if (data.score !== undefined) { currentScore = data.score; scoreElement.innerText = formatNumber(currentScore); }
            if (data.level !== undefined) { currentLevel = data.level; levelElement.innerText = currentLevel; }
            if (data.kills !== undefined) { currentKills = data.kills; killsElement.innerText = currentKills; }
        }
        if (players[data.id]) {
            if (data.score !== undefined) players[data.id].score = data.score;
        }
    });
    
    socket.on('playerUpdate', (data) => {
        if (data.id === myId) {
            if (data.health !== undefined) { currentHealth = data.health; healthValue.innerText = currentHealth; healthFill.style.width = `${(currentHealth / (data.maxHealth || 100)) * 100}%`; }
            if (data.damage !== undefined) { shipDamage = data.damage; fireRate = data.fireRate; shipSpeed = data.speed; shipSize = data.size; }
            if (data.level !== undefined) { currentLevel = data.level; levelElement.innerText = currentLevel; }
        }
    });
    
    socket.on('projectileShot', (projectile) => {
        bullets.push(projectile);
        setTimeout(() => { bullets = bullets.filter(b => b.id !== projectile.id); }, 200);
    });
    
    socket.on('enemyDestroyed', (enemyId) => {
        enemies = enemies.filter(e => e.id !== enemyId);
    });
    
    socket.on('enemyDamaged', (data) => {
        const enemy = enemies.find(e => e.id === data.id);
        if (enemy) enemy.health = data.health;
    });
    
    socket.on('crateCollected', (crateId) => {
        crates = crates.filter(c => c.id !== crateId);
    });
    
    socket.on('chatMessage', (data) => {
        addChatMessage(data.username, data.message);
    });
    
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = true;
        if (key === 'w') keys.w = true;
        if (key === 'a') keys.a = true;
        if (key === 's') keys.s = true;
        if (key === 'd') keys.d = true;
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = false;
        if (key === 'w') keys.w = false;
        if (key === 'a') keys.a = false;
        if (key === 's') keys.s = false;
        if (key === 'd') keys.d = false;
    });
    
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = canvasX + cameraX;
        mouseY = canvasY + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), MAP_WIDTH);
        mouseY = Math.min(Math.max(mouseY, 0), MAP_HEIGHT);
    });
    
    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0) isShooting = true;
    });
    
    window.addEventListener('mouseup', (e) => {
        if (e.button === 0) isShooting = false;
    });
    
    function updateShooting() {
        if (!isShooting || !myPlayer) return;
        const now = Date.now();
        if (now - lastShotTime < fireRate) return;
        lastShotTime = now;
        
        const dx = mouseX - myPlayer.x;
        const dy = mouseY - myPlayer.y;
        const angle = Math.atan2(dy, dx);
        
        socket.emit('playerShoot', { angle: angle });
    }
    
    function movePlayer() {
        if (!myPlayer) return;
        let moveX = 0, moveY = 0;
        if (keys.w || keys.ArrowUp) moveY -= 1;
        if (keys.s || keys.ArrowDown) moveY += 1;
        if (keys.a || keys.ArrowLeft) moveX -= 1;
        if (keys.d || keys.ArrowRight) moveX += 1;
        if (moveX !== 0 || moveY !== 0) {
            const len = Math.hypot(moveX, moveY);
            moveX /= len;
            moveY /= len;
            myPlayer.x += moveX * shipSpeed;
            myPlayer.y += moveY * shipSpeed;
        }
        myPlayer.x = Math.min(Math.max(myPlayer.x, 20), MAP_WIDTH - 20);
        myPlayer.y = Math.min(Math.max(myPlayer.y, 20), MAP_HEIGHT - 20);
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        cameraX = myPlayer.x - canvas.width / 2;
        cameraY = myPlayer.y - canvas.height / 2;
        cameraX = Math.min(Math.max(cameraX, 0), MAP_WIDTH - canvas.width);
        cameraY = Math.min(Math.max(cameraY, 0), MAP_HEIGHT - canvas.height);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        
        // Ocean background
        ctx.fillStyle = '#0a2a4a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw water waves
        ctx.strokeStyle = '#1a4a6a';
        ctx.lineWidth = 1;
        for (let i = 0; i < 20; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * 50 + (Date.now() * 0.02) % 50);
            ctx.lineTo(canvas.width, i * 50 + (Date.now() * 0.02) % 50);
            ctx.stroke();
        }
        
        // Draw petrol stations
        for (const station of petrolStations) {
            const screenX = station.x - cameraX;
            const screenY = station.y - cameraY;
            if (screenX + station.radius > 0 && screenX - station.radius < canvas.width &&
                screenY + station.radius > 0 && screenY - station.radius < canvas.height) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, station.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 200, 100, 0.15)';
                ctx.fill();
                ctx.strokeStyle = '#00ff44';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.font = '24px Arial';
                ctx.fillStyle = '#00ff44';
                ctx.fillText('⛽', screenX - 15, screenY + 10);
                
                // Floating particles
                for (let i = 0; i < 3; i++) {
                    ctx.fillStyle = `rgba(0, 255, 68, ${0.3 + Math.sin(Date.now() * 0.005 + i) * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(screenX + Math.sin(Date.now() * 0.003 + i) * 20, screenY + Math.cos(Date.now() * 0.004 + i) * 20, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // Draw supply crates
        for (const crate of crates) {
            const screenX = crate.x - cameraX;
            const screenY = crate.y - cameraY;
            if (screenX > -30 && screenX < canvas.width + 30 && screenY > -30 && screenY < canvas.height + 30) {
                ctx.fillStyle = crate.color;
                ctx.fillRect(screenX - 12, screenY - 10, 24, 20);
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(screenX - 14, screenY - 12, 28, 4);
                ctx.font = '16px Arial';
                ctx.fillStyle = 'white';
                ctx.fillText(crate.icon, screenX - 8, screenY + 6);
            }
        }
        
        // Draw enemies
        for (const enemy of enemies) {
            const screenX = enemy.x - cameraX;
            const screenY = enemy.y - cameraY;
            if (screenX > -50 && screenX < canvas.width + 50 && screenY > -50 && screenY < canvas.height + 50) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, enemy.size, 0, Math.PI * 2);
                ctx.fillStyle = enemy.color;
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(enemy.name, screenX - 25, screenY - 20);
                
                // Health bar
                const healthPercent = enemy.health / enemy.maxHealth;
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(screenX - 25, screenY - 30, 50, 5);
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(screenX - 25, screenY - 30, 50 * healthPercent, 5);
            }
        }
        
        // Draw other players
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = p.x - cameraX;
            const screenY = p.y - cameraY;
            if (screenX > -50 && screenX < canvas.width + 50 && screenY > -50 && screenY < canvas.height + 50) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, p.size || 16, 0, Math.PI * 2);
                ctx.fillStyle = p.color || '#ef4444';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(p.username, screenX - 20, screenY - 20);
                ctx.fillStyle = '#fbbf24';
                ctx.font = '10px Arial';
                ctx.fillText(`Lvl ${p.level}`, screenX - 15, screenY + 25);
            }
        }
        
        // Draw bullets
        for (const bullet of bullets) {
            const progress = Math.min(1, (Date.now() - bullet.startTime) / 200);
            const currentX = bullet.startX + (bullet.endX - bullet.startX) * progress;
            const currentY = bullet.startY + (bullet.endY - bullet.startY) * progress;
            const screenX = currentX - cameraX;
            const screenY = currentY - cameraY;
            ctx.beginPath();
            ctx.arc(screenX, screenY, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24';
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fbbf24';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Draw my player
        const myScreenX = myPlayer.x - cameraX;
        const myScreenY = myPlayer.y - cameraY;
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, shipSize, 0, Math.PI * 2);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Gun direction
        const angle = Math.atan2(mouseY - myPlayer.y, mouseX - myPlayer.x);
        const gunX = myScreenX + Math.cos(angle) * (shipSize + 5);
        const gunY = myScreenY + Math.sin(angle) * (shipSize + 5);
        ctx.beginPath();
        ctx.moveTo(myScreenX, myScreenY);
        ctx.lineTo(gunX, gunY);
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(myPlayer.username, myScreenX - 25, myScreenY - 25);
        
        // Health bar
        const healthPercent = currentHealth / (myPlayer.maxHealth || 100);
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(myScreenX - 30, myScreenY - 38, 60, 6);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(myScreenX - 30, myScreenY - 38, 60 * healthPercent, 6);
        
        // Level indicator
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(`Lvl ${currentLevel}`, myScreenX + 15, myScreenY - 20);
    }
</script>
</body>
</html>
