<!DOCTYPE html>
<html>
<head>
    <title>Naval.io - Real Warship Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 1px solid #00bcd4;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.2);
        }
        #joinScreen h1 {
            color: #00bcd4;
            margin-bottom: 20px;
            font-size: 42px;
            text-shadow: 0 0 10px #00bcd4;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 18px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
        }
        #joinScreen select {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
        }
        #joinBtn {
            background: #00bcd4;
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s;
        }
        #joinBtn:hover {
            background: #0097a7;
            box-shadow: 0 0 20px #00bcd4;
            transform: scale(1.02);
        }
        .errorMsg { color: #ef4444; margin-top: 10px; font-size: 14px; }
        .level-info {
            background: #1f2937;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            color: #fbbf24;
            font-size: 14px;
        }
        #gameScreen {
            background: #111827;
            padding: 0;
            border-radius: 16px;
        }
        #gameContainer { position: relative; }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
        }
        .stats {
            pointer-events: auto;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            border: 1px solid #374151;
        }
        .health-bar {
            width: 100px;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            margin-left: 8px;
        }
        .health-fill {
            height: 100%;
            width: 100%;
            background: #22c55e;
            border-radius: 4px;
            transition: width 0.2s;
        }
        #chatOverlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 280px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            border: 1px solid #374151;
            z-index: 10;
        }
        #chatMessages {
            height: 100px;
            overflow-y: auto;
            padding: 6px;
            font-size: 11px;
            color: #ccc;
        }
        #chatInputArea {
            display: flex;
            padding: 5px;
            gap: 5px;
            border-top: 1px solid #374151;
        }
        #chatInput {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 5px 8px;
            border-radius: 6px;
            outline: none;
            font-size: 11px;
        }
        #chatSend {
            background: #00bcd4;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .chat-system { color: #ef4444; font-style: italic; }
        .hidden { display: none; }
        .controls-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            color: #888;
            pointer-events: none;
        }
        #shipSelectPanel {
            position: absolute;
            bottom: 100px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #00bcd4;
            z-index: 20;
            min-width: 180px;
        }
        #shipSelectPanel h4 {
            color: #00bcd4;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .ship-option {
            background: #1f2937;
            padding: 6px 10px;
            margin: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .ship-option:hover {
            background: #374151;
            transform: scale(1.02);
        }
        .ship-option.selected {
            border: 1px solid #00bcd4;
            background: #00bcd4;
            color: #1f2937;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>⚓ NAVAL.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter captain name">
    <select id="shipSelect">
        <option value="rowboat">🛶 Rowboat (Level 0)</option>
    </select>
    <button id="joinBtn">Set Sail ⚓</button>
    <div class="level-info">⚡ Level up by earning points! New ships unlock every level.</div>
    <div id="errorMsg" class="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1400" height="900"></canvas>
        
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">⚓ Level: <span id="levelValue">0</span></div>
            <div class="stats">❤️ <span id="healthValue">100</span><div class="health-bar"><div id="healthFill" class="health-fill"></div></div></div>
            <div class="stats">⚔️ Kills: <span id="killsValue">0</span></div>
        </div>
        
        <div id="shipSelectPanel">
            <h4>🚢 SELECT YOUR WARSHIP</h4>
            <div id="shipList"></div>
        </div>
        
        <div id="chatOverlay">
            <div id="chatMessages"></div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="100">
                <button id="chatSend">Send</button>
            </div>
        </div>
        <div class="controls-hint">WASD/Arrows | 🖱️ Aim + Click to Shoot | ⛽ Stand in green circles for points</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let enemies = [];
    let crates = [];
    let petrolStations = [];
    let myId = null;
    let myPlayer = null;
    let currentScore = 0;
    let currentHealth = 100;
    let currentLevel = 0;
    let currentKills = 0;
    let bullets = [];
    let availableShips = [];
    let selectedShipId = 'rowboat';
    
    let cameraX = 0, cameraY = 0;
    let mouseX = 0, mouseY = 0;
    let isShooting = false;
    let lastShotTime = 0;
    let fireRate = 700;
    let shipDamage = 8;
    let shipSpeed = 5;
    let shipSize = 14;
    let myShipColor = '#8B6914';
    let myShipEra = 'Age of Sail';
    
    const MAP_WIDTH = 6000;
    const MAP_HEIGHT = 6000;
    
    // Wave animation variables
    let waveOffset = 0;
    
    const keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    
    // DOM elements
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const shipSelect = document.getElementById('shipSelect');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const levelElement = document.getElementById('levelValue');
    const healthValue = document.getElementById('healthValue');
    const healthFill = document.getElementById('healthFill');
    const killsElement = document.getElementById('killsValue');
    const shipList = document.getElementById('shipList');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    
    // ========== REAL WARSHIP DRAWING FUNCTION ==========
    function drawWarship(x, y, size, color, angle, era = 'Modern', isEnemy = false) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        
        // Shadow under ship
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        
        // Main hull (elongated shape)
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 1.3, size * 0.75, 0, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Deck
        ctx.beginPath();
        ctx.ellipse(0, -size * 0.15, size * 1.2, size * 0.4, 0, 0, Math.PI * 2);
        ctx.fillStyle = isEnemy ? '#5a3a2a' : '#654321';
        ctx.fill();
        
        // Bow (front)
        ctx.beginPath();
        ctx.moveTo(size * 1.4, -size * 0.2);
        ctx.lineTo(size * 1.9, 0);
        ctx.lineTo(size * 1.4, size * 0.2);
        ctx.fillStyle = isEnemy ? '#7a4a3a' : '#4a6a8a';
        ctx.fill();
        
        // Stern flag
        ctx.beginPath();
        ctx.moveTo(-size * 1.4, -size * 0.3);
        ctx.lineTo(-size * 1.7, -size * 0.6);
        ctx.lineTo(-size * 1.7, 0);
        ctx.fillStyle = '#ef4444';
        ctx.fill();
        
        // Main gun turret
        const turretSize = size * 0.55;
        ctx.beginPath();
        ctx.ellipse(0, -size * 0.1, turretSize, turretSize * 0.6, 0, 0, Math.PI * 2);
        ctx.fillStyle = isEnemy ? '#4a4a4a' : '#2c3e50';
        ctx.fill();
        ctx.strokeStyle = '#1a1a2e';
        ctx.stroke();
        
        // Main gun barrel
        ctx.beginPath();
        ctx.moveTo(size * 0.7, -size * 0.1);
        ctx.lineTo(size * 1.4, -size * 0.15);
        ctx.lineTo(size * 1.4, -size * 0.05);
        ctx.lineTo(size * 0.7, -size * 0.05);
        ctx.fillStyle = '#7f8c8d';
        ctx.fill();
        
        // Secondary turret (rear)
        ctx.beginPath();
        ctx.ellipse(-size * 0.6, -size * 0.05, turretSize * 0.6, turretSize * 0.4, 0, 0, Math.PI * 2);
        ctx.fillStyle = isEnemy ? '#5a5a5a' : '#34495e';
        ctx.fill();
        
        // Secondary gun barrel
        ctx.beginPath();
        ctx.moveTo(-size * 0.3, -size * 0.05);
        ctx.lineTo(size * 0.1, -size * 0.08);
        ctx.lineTo(size * 0.1, -size * 0.02);
        ctx.lineTo(-size * 0.3, -size * 0.05);
        ctx.fillStyle = '#95a5a6';
        ctx.fill();
        
        // Bridge/Superstructure
        ctx.fillStyle = isEnemy ? '#3a3a3a' : '#2c3e50';
        ctx.fillRect(-size * 0.35, -size * 0.55, size * 0.7, size * 0.45);
        
        // Radar dome
        ctx.beginPath();
        ctx.arc(-size * 0.1, -size * 0.7, size * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = '#e74c3c';
        ctx.fill();
        
        // Smokestack
        ctx.fillStyle = isEnemy ? '#5a5a5a' : '#7f8c8d';
        ctx.fillRect(size * 0.35, -size * 0.6, size * 0.28, size * 0.45);
        
        // Smoke effect
        const smokeTime = Date.now() * 0.005;
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(size * 0.49 + Math.sin(smokeTime + i) * 2, -size * 0.65 - i * 3, 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100, 100, 100, ${0.3 - i * 0.1})`;
            ctx.fill();
        }
        
        // Waterline reflection
        ctx.beginPath();
        ctx.ellipse(0, size * 0.5, size * 1.4, size * 0.2, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(100, 200, 255, 0.25)';
        ctx.fill();
        
        // Era badge on hull
        if (era) {
            ctx.font = `bold ${Math.floor(size * 0.25)}px monospace`;
            ctx.fillStyle = '#f1c40f';
            ctx.shadowBlur = 2;
            let eraText = era;
            if (era === 'Age of Sail') eraText = '⚓ SAIL';
            else if (era === 'Napoleonic') eraText = '⚔️ NAPOLEON';
            else if (era === 'Spanish Armada') eraText = '🛡️ ARMADA';
            else if (era === 'British Empire') eraText = '👑 BRITISH';
            else if (era === 'American Civil War') eraText = '🔫 CIVIL WAR';
            else if (era === 'WWI Era') eraText = '🔥 WWI';
            else if (era === 'WWII Era') eraText = '💣 WWII';
            else if (era === 'Modern') eraText = '🚁 MODERN';
            else if (era === 'Future') eraText = '⚡ FUTURE';
            ctx.fillText(eraText, -size * 0.7, size * 0.3);
        }
        
        // Portholes/windows
        for (let i = -1; i <= 1; i++) {
            ctx.beginPath();
            ctx.arc(i * size * 0.5, -size * 0.2, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#f1c40f';
            ctx.fill();
        }
        
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    
    // ========== ENEMY PIRATE SHIP DRAWING ==========
    function drawEnemyShip(x, y, size, color, angle, isRare = false) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        
        // Dark hull
        ctx.beginPath();
        ctx.ellipse(0, 0, size * 1.2, size * 0.7, 0, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        
        // Spiky bow
        ctx.beginPath();
        ctx.moveTo(size * 1.3, -size * 0.2);
        ctx.lineTo(size * 1.9, 0);
        ctx.lineTo(size * 1.3, size * 0.2);
        ctx.fillStyle = '#8B0000';
        ctx.fill();
        
        // Jolly Roger flag
        ctx.beginPath();
        ctx.moveTo(-size * 1.3, -size * 0.3);
        ctx.lineTo(-size * 1.6, -size * 0.7);
        ctx.lineTo(-size * 1.6, -size * 0.1);
        ctx.fillStyle = '#000000';
        ctx.fill();
        ctx.font = `${Math.floor(size * 0.7)}px Arial`;
        ctx.fillStyle = '#ffffff';
        ctx.fillText('☠️', -size * 1.55, -size * 0.4);
        
        // Skull on hull
        ctx.font = `${Math.floor(size * 0.8)}px Arial`;
        ctx.fillStyle = '#ffffff';
        ctx.fillText('💀', -size * 0.3, -size * 0.1);
        
        // Red glowing eyes for rare enemies
        if (isRare) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0000';
        }
        ctx.beginPath();
        ctx.arc(size * 0.45, -size * 0.3, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ff0000';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-size * 0.35, -size * 0.3, 3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    
    function formatNumber(n) {
        if (n >= 10000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }
    
    function addChatMessage(sender, message, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) chatMessages.removeChild(chatMessages.firstChild);
    }
    
    function sendChat() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendChat;
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });
    
    function updateShipList() {
        if (!shipList) return;
        shipList.innerHTML = '';
        for (const ship of availableShips) {
            const div = document.createElement('div');
            div.className = `ship-option ${selectedShipId === ship.id ? 'selected' : ''}`;
            div.innerHTML = `${ship.name} <span style="font-size:9px; opacity:0.7;">(Lvl ${ship.level})</span>`;
            div.onclick = () => {
                if (ship.level <= currentLevel) {
                    selectedShipId = ship.id;
                    updateShipList();
                    if (myPlayer) {
                        socket.emit('changeShip', { shipId: selectedShipId });
                    }
                }
            };
            shipList.appendChild(div);
        }
    }
    
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        socket.emit('joinGame', { username: username, shipId: selectedShipId });
        
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                updateShooting();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        
        setInterval(() => {
            if (myPlayer) {
                socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
            }
        }, 50);
        
        setInterval(() => {
            waveOffset = (waveOffset + 0.02) % (Math.PI * 2);
        }, 100);
    };
    
    socket.on('connect', () => console.log('Connected to server'));
    
    socket.on('currentPlayers', (serverPlayers) => {
        players = serverPlayers;
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                currentScore = myPlayer.score || 0;
                currentHealth = myPlayer.health || 100;
                currentLevel = myPlayer.level || 0;
                currentKills = myPlayer.kills || 0;
                shipSize = myPlayer.size || 14;
                myShipColor = myPlayer.color || '#8B6914';
                myShipEra = myPlayer.era || 'Age of Sail';
                scoreElement.innerText = formatNumber(currentScore);
                levelElement.innerText = currentLevel;
                healthValue.innerText = currentHealth;
                healthFill.style.width = `${(currentHealth / (myPlayer.maxHealth || 100)) * 100}%`;
                killsElement.innerText = currentKills;
                fireRate = myPlayer.fireRate || 700;
                shipDamage = myPlayer.damage || 8;
                shipSpeed = myPlayer.speed || 5;
            }
        }
    });
    
    socket.on('availableShips', (ships) => {
        availableShips = ships;
        updateShipList();
    });
    
    socket.on('currentEnemies', (serverEnemies) => { enemies = serverEnemies; });
    socket.on('enemiesUpdate', (serverEnemies) => { enemies = serverEnemies; });
    socket.on('currentCrates', (serverCrates) => { crates = serverCrates; });
    socket.on('cratesUpdate', (serverCrates) => { crates = serverCrates; });
    socket.on('stationsUpdate', (stations) => { petrolStations = stations; });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        addChatMessage('System', `${playerData.username} joined!`, true);
    });
    
    socket.on('playerMoved', (data) => {
        if (players[data.id]) {
            players[data.id].x = data.x;
            players[data.id].y = data.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, true);
            delete players[playerId];
        }
    });
    
    socket.on('scoreUpdate', (data) => {
        if (data.id === myId) {
            if (data.score !== undefined) { currentScore = data.score; scoreElement.innerText = formatNumber(currentScore); }
            if (data.level !== undefined) { currentLevel = data.level; levelElement.innerText = currentLevel; }
            if (data.kills !== undefined) { currentKills = data.kills; killsElement.innerText = currentKills; }
        }
    });
    
    socket.on('playerUpdate', (data) => {
        if (data.id === myId) {
            if (data.health !== undefined) { 
                currentHealth = data.health; 
                healthValue.innerText = currentHealth; 
                healthFill.style.width = `${(currentHealth / (data.maxHealth || 100)) * 100}%`;
            }
            if (data.damage !== undefined) { shipDamage = data.damage; fireRate = data.fireRate; shipSpeed = data.speed; shipSize = data.size; }
            if (data.level !== undefined) { currentLevel = data.level; levelElement.innerText = currentLevel; }
            if (data.color !== undefined) { myShipColor = data.color; }
            if (data.era !== undefined) { myShipEra = data.era; }
        } else {
            const player = players[data.id];
            if (player) {
                if (data.health !== undefined) player.health = data.health;
                if (data.size !== undefined) player.size = data.size;
                if (data.color !== undefined) player.color = data.color;
            }
        }
    });
    
    socket.on('projectileShot', (projectile) => {
        bullets.push(projectile);
        setTimeout(() => { bullets = bullets.filter(b => b.id !== projectile.id); }, 200);
    });
    
    socket.on('enemyDestroyed', (enemyId) => {
        enemies = enemies.filter(e => e.id !== enemyId);
    });
    
    socket.on('enemyDamaged', (data) => {
        const enemy = enemies.find(e => e.id === data.id);
        if (enemy) enemy.health = data.health;
    });
    
    socket.on('crateCollected', (crateId) => {
        crates = crates.filter(c => c.id !== crateId);
    });
    
    socket.on('chatMessage', (data) => {
        addChatMessage(data.username, data.message, data.isSystem);
    });
    
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = true;
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = false;
    });
    
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = canvasX + cameraX;
        mouseY = canvasY + cameraY;
        mouseX = Math.min(Math.max(mouseX, 0), MAP_WIDTH);
        mouseY = Math.min(Math.max(mouseY, 0), MAP_HEIGHT);
    });
    
    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0) isShooting = true;
    });
    
    window.addEventListener('mouseup', (e) => {
        if (e.button === 0) isShooting = false;
    });
    
    function updateShooting() {
        if (!isShooting || !myPlayer) return;
        const now = Date.now();
        if (now - lastShotTime < fireRate) return;
        lastShotTime = now;
        
        const dx = mouseX - myPlayer.x;
        const dy = mouseY - myPlayer.y;
        const angle = Math.atan2(dy, dx);
        
        socket.emit('playerShoot', { angle: angle });
    }
    
    function movePlayer() {
        if (!myPlayer) return;
        let moveX = 0, moveY = 0;
        if (keys.w || keys.ArrowUp) moveY -= 1;
        if (keys.s || keys.ArrowDown) moveY += 1;
        if (keys.a || keys.ArrowLeft) moveX -= 1;
        if (keys.d || keys.ArrowRight) moveX += 1;
        if (moveX !== 0 || moveY !== 0) {
            const len = Math.hypot(moveX, moveY);
            moveX /= len;
            moveY /= len;
            myPlayer.x += moveX * shipSpeed;
            myPlayer.y += moveY * shipSpeed;
        }
        myPlayer.x = Math.min(Math.max(myPlayer.x, 30), MAP_WIDTH - 30);
        myPlayer.y = Math.min(Math.max(myPlayer.y, 30), MAP_HEIGHT - 30);
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        cameraX = myPlayer.x - canvas.width / 2;
        cameraY = myPlayer.y - canvas.height / 2;
        cameraX = Math.min(Math.max(cameraX, 0), MAP_WIDTH - canvas.width);
        cameraY = Math.min(Math.max(cameraY, 0), MAP_HEIGHT - canvas.height);
    }
    
    function drawOcean() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#0a3a6a');
        gradient.addColorStop(0.5, '#0a2a5a');
        gradient.addColorStop(1, '#061a3a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < 30; i++) {
            const y = i * 30 + Math.sin(waveOffset + i * 0.5) * 8;
            ctx.beginPath();
            ctx.moveTo(0, y);
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.lineTo(x, y + Math.sin(x * 0.008 + waveOffset) * 4);
            }
            ctx.lineTo(canvas.width, y);
            ctx.strokeStyle = `rgba(100, 180, 255, ${0.08})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        drawOcean();
        
        // Draw petrol stations
        for (const station of petrolStations) {
            const screenX = station.x - cameraX;
            const screenY = station.y - cameraY;
            if (screenX + station.radius > 0 && screenX - station.radius < canvas.width) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, station.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 200, 100, 0.1)';
                ctx.fill();
                ctx.strokeStyle = '#00ff44';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                const pulse = 0.5 + Math.sin(Date.now() * 0.003) * 0.2;
                ctx.beginPath();
                ctx.arc(screenX, screenY, station.radius * (0.8 + pulse * 0.2), 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 68, ${0.3 + pulse * 0.3})`;
                ctx.stroke();
                
                ctx.font = '28px Arial';
                ctx.fillStyle = '#00ff44';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff44';
                ctx.fillText('⛽', screenX - 18, screenY + 12);
                ctx.shadowBlur = 0;
            }
        }
        
        // Draw crates
        for (const crate of crates) {
            const screenX = crate.x - cameraX;
            const screenY = crate.y - cameraY;
            if (screenX > -40 && screenX < canvas.width + 40) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(screenX + 2, screenY + 15, 16, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = crate.color;
                ctx.fillRect(screenX - 14, screenY - 10, 28, 22);
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(screenX - 16, screenY - 12, 32, 4);
                ctx.font = '20px Arial';
                ctx.fillStyle = 'white';
                ctx.fillText(crate.icon, screenX - 10, screenY + 6);
            }
        }
        
        // Draw enemies (as pirate ships)
        for (const enemy of enemies) {
            const screenX = enemy.x - cameraX;
            const screenY = enemy.y - cameraY;
            if (screenX > -80 && screenX < canvas.width + 80) {
                const enemyAngle = myPlayer ? Math.atan2(myPlayer.y - enemy.y, myPlayer.x - enemy.x) : 0;
                drawEnemyShip(screenX, screenY, enemy.size || 18, enemy.color || '#8B0000', enemyAngle, enemy.rare);
                
                const healthPercent = enemy.health / enemy.maxHealth;
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(screenX - 25, screenY - 40, 50, 5);
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(screenX - 25, screenY - 40, 50 * healthPercent, 5);
                
                ctx.fillStyle = 'white';
                ctx.font = '10px Arial';
                ctx.fillText(enemy.name, screenX - 20, screenY - 45);
            }
        }
        
        // Draw other players (as real warships)
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = p.x - cameraX;
            const screenY = p.y - cameraY;
            if (screenX > -80 && screenX < canvas.width + 80) {
                const playerAngle = Math.atan2(mouseY - p.y, mouseX - p.x);
                drawWarship(screenX, screenY, p.size || 16, p.color || '#3b82f6', playerAngle, p.era || 'Modern', false);
                
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(p.username, screenX - 20, screenY - 50);
                
                ctx.fillStyle = '#00bcd4';
                ctx.font = 'bold 10px Arial';
                ctx.fillText(`Lvl ${p.level}`, screenX + 15, screenY - 45);
                
                // Health bar
                const healthPercent = p.health / (p.maxHealth || 100);
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(screenX - 25, screenY - 62, 50, 4);
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(screenX - 25, screenY - 62, 50 * healthPercent, 4);
            }
        }
        
        // Draw bullets
        for (const bullet of bullets) {
            const progress = Math.min(1, (Date.now() - bullet.startTime) / 200);
            const currentX = bullet.startX + (bullet.endX - bullet.startX) * progress;
            const currentY = bullet.startY + (bullet.endY - bullet.startY) * progress;
            const screenX = currentX - cameraX;
            const screenY = currentY - cameraY;
            ctx.beginPath();
            ctx.arc(screenX, screenY, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24';
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fbbf24';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Draw my player
        const myScreenX = myPlayer.x - cameraX;
        const myScreenY = myPlayer.y - cameraY;
        const aimAngle = Math.atan2(mouseY - myPlayer.y, mouseX - myPlayer.x);
        
        drawWarship(myScreenX, myScreenY, shipSize, myShipColor, aimAngle, myShipEra, false);
        
        // Muzzle flash
        if (isShooting && Date.now() - lastShotTime < 100) {
            const gunX = myScreenX + Math.cos(aimAngle) * (shipSize + 10);
            const gunY = myScreenY + Math.sin(aimAngle) * (shipSize + 10);
            ctx.beginPath();
            ctx.arc(gunX, gunY, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6600';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(gunX, gunY, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffff00';
            ctx.fill();
        }
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(myPlayer.username, myScreenX - 25, myScreenY - 55);
        
        ctx.fillStyle = '#00bcd4';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(`${myPlayer.shipName || 'Warship'} Lvl ${currentLevel}`, myScreenX - 35, myScreenY - 68);
        
        const healthPercent = currentHealth / (myPlayer.maxHealth || 100);
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(myScreenX - 35, myScreenY - 78, 70, 6);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(myScreenX - 35, myScreenY - 78, 70 * healthPercent, 6);
    }
</script>
</body>
