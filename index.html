<!DOCTYPE html>
<html>
<head>
    <title>Zombie.io - Survive the Horde</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #joinScreen, #gameScreen {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }
        #joinScreen h1 {
            color: #fbbf24;
            margin-bottom: 20px;
            font-size: 36px;
        }
        #joinScreen input {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 10px;
            outline: none;
        }
        #joinScreen button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        #joinScreen button:hover {
            background: #2563eb;
        }
        #errorMsg {
            color: #ef4444;
            margin-top: 10px;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 2px solid #1f2937;
            display: block;
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
            pointer-events: none;
        }
        .stats, #waveInfo, #upgradePanel {
            pointer-events: auto;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            border: 1px solid #374151;
        }
        #upgradePanel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upgrade-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            pointer-events: auto;
        }
        .upgrade-btn:hover {
            background: #2563eb;
        }
        .health-bar {
            width: 100px;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            margin-left: 8px;
        }
        .health-fill {
            height: 100%;
            width: 100%;
            background: #22c55e;
            border-radius: 4px;
            transition: width 0.2s;
        }
        #chatOverlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 280px;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #374151;
            z-index: 10;
        }
        #chatMessages {
            height: 100px;
            overflow-y: auto;
            padding: 6px;
            font-size: 11px;
            color: #ccc;
        }
        #chatMessages div {
            margin-bottom: 3px;
        }
        #chatInputArea {
            display: flex;
            padding: 5px;
            gap: 5px;
            border-top: 1px solid #374151;
        }
        #chatInput {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 5px 8px;
            border-radius: 6px;
            outline: none;
            font-size: 11px;
        }
        #chatSend {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .chat-system {
            color: #ef4444;
            font-style: italic;
        }
        .hidden {
            display: none;
        }
        .controls-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            color: #888;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <h1>🧟 ZOMBIE.io</h1>
    <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
    <br>
    <button id="joinBtn">Join Game</button>
    <div id="errorMsg"></div>
</div>

<div id="gameScreen" class="hidden">
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div id="ui">
            <div class="stats">🎯 Score: <span id="scoreValue">0</span></div>
            <div class="stats">❤️ Health: <span id="healthValue">100</span>
                <div class="health-bar"><div id="healthFill" class="health-fill" style="width:100%"></div></div>
            </div>
            <div id="waveInfo">🧟 Wave: <span id="waveValue">1</span></div>
            <div id="upgradePanel">
                <button class="upgrade-btn" data-upgrade="damage">💪 Damage (<span id="damageLevel">1</span>)</button>
                <button class="upgrade-btn" data-upgrade="fireRate">⚡ Fire Rate (<span id="fireRateLevel">1</span>)</button>
                <button class="upgrade-btn" data-upgrade="speed">🏃 Speed (<span id="speedLevel">1</span>)</button>
                <button class="upgrade-btn" data-upgrade="health">❤️ Health (<span id="healthLevel">1</span>)</button>
            </div>
        </div>
        
        <div id="chatOverlay">
            <div id="chatMessages"></div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="100">
                <button id="chatSend">Send</button>
            </div>
        </div>
        <div class="controls-hint">⬆️ WASD / Arrow Keys | 🖱️ Mouse to aim | Click to shoot</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({
        reconnection: true,
        reconnectionAttempts: 5,
        reconnectionDelay: 1000
    });
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let players = {};
    let zombies = {};
    let myId = null;
    let myPlayer = null;
    let currentScore = 0;
    let currentHealth = 100;
    let currentWave = 1;
    let bullets = [];
    
    let cameraX = 0, cameraY = 0;
    let mouseX = 0, mouseY = 0;
    let isShooting = false;
    let lastShotTime = 0;
    let fireRate = 300;
    
    let upgrades = { damage: 1, fireRateLevel: 1, speed: 3, healthLevel: 1 };
    
    const MAP_WIDTH = 3000;
    const MAP_HEIGHT = 3000;
    
    const keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    
    const joinScreen = document.getElementById('joinScreen');
    const gameScreen = document.getElementById('gameScreen');
    const usernameInput = document.getElementById('usernameInput');
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');
    const scoreElement = document.getElementById('scoreValue');
    const healthValue = document.getElementById('healthValue');
    const healthFill = document.getElementById('healthFill');
    const waveValue = document.getElementById('waveValue');
    const damageLevelSpan = document.getElementById('damageLevel');
    const fireRateLevelSpan = document.getElementById('fireRateLevel');
    const speedLevelSpan = document.getElementById('speedLevel');
    const healthLevelSpan = document.getElementById('healthLevel');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    
    function formatScore(score) {
        if (score >= 1_000_000) return (score / 1_000_000).toFixed(1) + 'M';
        if (score >= 1_000) return (score / 1_000).toFixed(1) + 'K';
        return score.toString();
    }
    
    function addChatMessage(sender, message, isSystem = false) {
        const div = document.createElement('div');
        if (isSystem) {
            div.innerHTML = `<span class="chat-system">🔔 ${message}</span>`;
        } else {
            div.innerHTML = `<span>💬 ${sender}:</span> ${message}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        while (chatMessages.children.length > 50) chatMessages.removeChild(chatMessages.firstChild);
    }
    
    function sendChat() {
        const text = chatInput.value.trim();
        if (text === '') return;
        socket.emit('chatMessage', { message: text });
        chatInput.value = '';
        chatInput.focus();
    }
    
    chatSend.onclick = sendChat;
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });
    
    // FIXED JOIN BUTTON
    joinBtn.onclick = () => {
        const username = usernameInput.value.trim();
        if (username === '') {
            errorMsg.innerText = 'Please enter a username';
            return;
        }
        
        console.log('Joining game as:', username);
        
        joinScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        socket.emit('joinGame', { username: username });
        
        function gameLoop() {
            if (myPlayer) {
                movePlayer();
                updateShooting();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        
        setInterval(() => {
            if (myPlayer) {
                socket.emit('playerMovement', { x: myPlayer.x, y: myPlayer.y });
            }
        }, 50);
    };
    
    socket.on('connect', () => {
        console.log('Connected to server');
    });
    
    socket.on('currentPlayers', (serverPlayers) => {
        console.log('Received players:', Object.keys(serverPlayers).length);
        players = serverPlayers;
        for (let id in players) {
            if (players[id].username === usernameInput.value.trim()) {
                myId = id;
                myPlayer = players[id];
                currentScore = myPlayer.score;
                currentHealth = myPlayer.health;
                scoreElement.innerText = formatScore(currentScore);
                healthValue.innerText = currentHealth;
                healthFill.style.width = `${(currentHealth / (myPlayer.maxHealth || 100)) * 100}%`;
                upgrades.damage = myPlayer.damage || 1;
                upgrades.speed = myPlayer.speed || 3;
                damageLevelSpan.innerText = upgrades.damage;
                fireRateLevelSpan.innerText = Math.floor(300 / (myPlayer.fireRate || 300));
                speedLevelSpan.innerText = Math.floor(upgrades.speed);
                console.log('My player set!');
            }
        }
    });
    
    socket.on('currentZombies', (serverZombies) => {
        zombies = serverZombies;
        console.log('Zombies loaded:', Object.keys(zombies).length);
    });
    
    socket.on('zombiesUpdate', (serverZombies) => {
        zombies = serverZombies;
    });
    
    socket.on('waveUpdate', (wave) => {
        currentWave = wave;
        waveValue.innerText = wave;
        addChatMessage('System', `🧟 WAVE ${wave} STARTED!`, true);
    });
    
    socket.on('newPlayer', (playerData) => {
        players[playerData.id] = playerData;
        addChatMessage('System', `${playerData.username} joined!`, true);
    });
    
    socket.on('playerMoved', (data) => {
        if (players[data.id]) {
            players[data.id].x = data.x;
            players[data.id].y = data.y;
        }
    });
    
    socket.on('playerDisconnected', (playerId) => {
        if (players[playerId]) {
            addChatMessage('System', `${players[playerId].username} left`, true);
            delete players[playerId];
        }
    });
    
    socket.on('scoreUpdate', (data) => {
        if (data.id === myId) {
            currentScore = data.score;
            scoreElement.innerText = formatScore(currentScore);
        }
        if (players[data.id]) players[data.id].score = data.score;
    });
    
    socket.on('playerUpdate', (data) => {
        if (data.id === myId) {
            if (data.health !== undefined) {
                currentHealth = data.health;
                healthValue.innerText = currentHealth;
                healthFill.style.width = `${(currentHealth / (data.maxHealth || 100)) * 100}%`;
            }
            if (data.damage !== undefined) {
                upgrades.damage = data.damage;
                damageLevelSpan.innerText = upgrades.damage;
            }
            if (data.fireRate !== undefined) {
                fireRate = data.fireRate;
                fireRateLevelSpan.innerText = Math.floor(300 / fireRate);
            }
            if (data.speed !== undefined) {
                upgrades.speed = data.speed;
                speedLevelSpan.innerText = Math.floor(upgrades.speed);
            }
        }
        if (players[data.id]) {
            if (data.health !== undefined) players[data.id].health = data.health;
            if (data.maxHealth !== undefined) players[data.id].maxHealth = data.maxHealth;
        }
    });
    
    socket.on('bulletShot', (bullet) => {
        bullets.push(bullet);
        setTimeout(() => {
            bullets = bullets.filter(b => b.id !== bullet.id);
        }, 100);
    });
    
    socket.on('zombieKilled', (zombieId) => {
        delete zombies[zombieId];
    });
    
    socket.on('zombieDamaged', (data) => {
        if (zombies[data.id]) zombies[data.id].health = data.health;
    });
    
    socket.on('chatMessage', (data) => {
        addChatMessage(data.username, data.message, data.isSystem);
    });
    
    document.querySelectorAll('.upgrade-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const upgrade = btn.getAttribute('data-upgrade');
            socket.emit('upgrade', upgrade);
        });
    });
    
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = true;
        if (key === 'w') keys.w = true;
        if (key === 'a') keys.a = true;
        if (key === 's') keys.s = true;
        if (key === 'd') keys.d = true;
    });
    
    window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (keys.hasOwnProperty(key)) keys[key] = false;
        if (key === 'w') keys.w = false;
        if (key === 'a') keys.a = false;
        if (key === 's') keys.s = false;
        if (key === 'd') keys.d = false;
    });
    
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let canvasX = (e.clientX - rect.left) * scaleX;
        let canvasY = (e.clientY - rect.top) * scaleY;
        mouseX = (canvasX) + cameraX;
        mouseY = (canvasY) + cameraY;
    });
    
    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
            isShooting = true;
        }
    });
    
    window.addEventListener('mouseup', (e) => {
        if (e.button === 0) {
            isShooting = false;
        }
    });
    
    function updateShooting() {
        if (!isShooting || !myPlayer) return;
        
        const now = Date.now();
        if (now - lastShotTime < fireRate) return;
        lastShotTime = now;
        
        const dx = mouseX - myPlayer.x;
        const dy = mouseY - myPlayer.y;
        const angle = Math.atan2(dy, dx);
        
        socket.emit('playerShoot', { angle: angle });
    }
    
    function movePlayer() {
        if (!myPlayer) return;
        
        let moveX = 0, moveY = 0;
        if (keys.w || keys.ArrowUp) moveY -= 1;
        if (keys.s || keys.ArrowDown) moveY += 1;
        if (keys.a || keys.ArrowLeft) moveX -= 1;
        if (keys.d || keys.ArrowRight) moveX += 1;
        
        if (moveX !== 0 || moveY !== 0) {
            const len = Math.hypot(moveX, moveY);
            moveX /= len;
            moveY /= len;
            myPlayer.x += moveX * myPlayer.speed;
            myPlayer.y += moveY * myPlayer.speed;
        }
        
        myPlayer.x = Math.min(Math.max(myPlayer.x, 20), MAP_WIDTH - 20);
        myPlayer.y = Math.min(Math.max(myPlayer.y, 20), MAP_HEIGHT - 20);
    }
    
    function updateCamera() {
        if (!myPlayer) return;
        cameraX = myPlayer.x - canvas.width / 2;
        cameraY = myPlayer.y - canvas.height / 2;
        cameraX = Math.min(Math.max(cameraX, 0), MAP_WIDTH - canvas.width);
        cameraY = Math.min(Math.max(cameraY, 0), MAP_HEIGHT - canvas.height);
    }
    
    function draw() {
        if (!myPlayer) return;
        updateCamera();
        
        ctx.fillStyle = '#0a2a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw other players
        for (const id in players) {
            if (id === myId) continue;
            const p = players[id];
            const screenX = p.x - cameraX;
            const screenY = p.y - cameraY;
            if (screenX > -30 && screenX < canvas.width + 30 && screenY > -30 && screenY < canvas.height + 30) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#3b82f6';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(p.username, screenX - 20, screenY - 20);
            }
        }
        
        // Draw zombies
        for (const id in zombies) {
            const z = zombies[id];
            const screenX = z.x - cameraX;
            const screenY = z.y - cameraY;
            if (screenX > -50 && screenX < canvas.width + 50 && screenY > -50 && screenY < canvas.height + 50) {
                ctx.beginPath();
                ctx.arc(screenX, screenY, z.size, 0, Math.PI * 2);
                ctx.fillStyle = z.color;
                ctx.fill();
                
                // Draw eyes
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(screenX - 6, screenY - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(screenX + 6, screenY - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(screenX - 6, screenY - 5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(screenX + 6, screenY - 5, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw mouth
                ctx.beginPath();
                ctx.arc(screenX, screenY + 5, 8, 0.1, Math.PI - 0.1);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Health bar for tanks/boss
                if (z.health > 1) {
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(screenX - 20, screenY - 20, 40, 5);
                    ctx.fillStyle = '#22c55e';
                    ctx.fillRect(screenX - 20, screenY - 20, 40 * (z.health / z.maxHealth), 5);
                }
            }
        }
        
        // Draw bullets
        for (const bullet of bullets) {
            ctx.beginPath();
            ctx.arc(bullet.x - cameraX, bullet.y - cameraY, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24';
            ctx.fill();
        }
        
        // Draw my player
        const myScreenX = myPlayer.x - cameraX;
        const myScreenY = myPlayer.y - cameraY;
        ctx.beginPath();
        ctx.arc(myScreenX, myScreenY, 15, 0, Math.PI * 2);
        ctx.fillStyle = '#3b82f6';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Draw gun direction
        const angle = Math.atan2(mouseY - myPlayer.y, mouseX - myPlayer.x);
        const gunX = myScreenX + Math.cos(angle) * 18;
        const gunY = myScreenY + Math.sin(angle) * 18;
        ctx.beginPath();
        ctx.moveTo(myScreenX, myScreenY);
        ctx.lineTo(gunX, gunY);
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(myPlayer.username, myScreenX - 20, myScreenY - 20);
        
        // Health bar
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(myScreenX - 20, myScreenY - 30, 40, 5);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(myScreenX - 20, myScreenY - 30, 40 * (currentHealth / (myPlayer.maxHealth || 100)), 5);
    }
</script>
</body>
</html>
